<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kLN College of Engineering - Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#004d99,#66ccff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:350px;
    background:#fff;
    padding:30px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
}

.login-box img{
    width:90px;
    margin-bottom:15px;
}

.login-box h2{
    color:#003366;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    width:100%;
    padding:12px;
    background:#004d99;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#003366;
}

.footer{
    margin-top:15px;
    font-size:13px;
    color:#666;
}
</style>

</head>

<body>

<div class="login-box">

    <!-- Save your uploaded logo as logo.png -->
    <img src="https://www.klnce.edu/symposium/zeigen11/Higher%20Band%20width/klncelogo.png" alt="College Logo">

    <h2>KLN College of Engineering</h2>

    <form>
        <input type="text" placeholder="Username" required>

        <input type="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="footer">
        Excellence in Engineering Education
    </div>

</div>

</body>
</html>
